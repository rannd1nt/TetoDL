name: Binary Test (All Platforms)

on:
  workflow_dispatch:
    inputs:
      test_url:
        description: "Single video URL"
        default: "https://youtu.be/jQhArAdrAtU"
      playlist_url:
        description: "Playlist URL"
        default: "https://youtube.com/playlist?list=PLCmop9hr8TtM"
      timeout:
        description: "Per-test timeout (seconds)"
        default: "120"
      ytdlp_update:
        description: "Run yt-dlp update tests"
        type: boolean
        default: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ matrix.os == 'windows-latest' && '~\AppData\Local\pip\Cache' || '~/.cache/pip' }}
          key: pip-bin-all-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Install system deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg

      - name: Install build deps
        run: |
          pip install pyinstaller
          pip install -e ".[windows]"

      - name: Build binary
        run: pyinstaller tetodl.spec --clean

      - name: Smoke test (version)
        shell: bash
        run: |
          bin="./dist/tetodl${{ matrix.os == 'windows-latest' && '.exe' || '-linux' }}"
          "$bin" --version 2>&1 | grep -qE "[0-9]+\.[0-9]+\.[0-9]+"

      - name: Smoke test (help)
        shell: bash
        run: |
          bin="./dist/tetodl${{ matrix.os == 'windows-latest' && '.exe' || '-linux' }}"
          "$bin" --help 2>&1 | grep -q "usage"

      - name: Run comprehensive tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          .\scripts\test-windows.ps1 `
            -Binary dist\tetodl.exe `
            -TestUrl "${{ inputs.test_url }}" `
            -PlaylistUrl "${{ inputs.playlist_url }}" `
            -Timeout ${{ inputs.timeout }} `
            $(if ('${{ inputs.ytdlp_update }}' -eq 'true') { '-YtdlpUpdate' })

      - name: Run comprehensive tests (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          chmod +x scripts/test-linux.sh
          bash scripts/test-linux.sh \
            --binary ./dist/tetodl-linux \
            --test-url "${{ inputs.test_url }}" \
            --playlist-url "${{ inputs.playlist_url }}" \
            --timeout ${{ inputs.timeout }} \
            ${{ inputs.ytdlp_update == true && '--ytdlp-update' || '' }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }}
          path: test-results.xml
