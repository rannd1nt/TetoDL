name: CI/CD

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release:
        description: "Create release?"
        type: boolean
        default: false
      full_ci:
        description: "Run full suite (incl distro shell test + E2E)?"
        type: boolean
        default: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff mypy types-requests
      - run: ruff check tetodl/
      - run: mypy tetodl/ --ignore-missing-imports --check-untyped-defs

  test-unit:
    name: Unit (py${{ matrix.python }}, ${{ matrix.os }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: pip install -e ".[full,windows]" pytest pytest-mock
      - run: pytest -m "not slow and not network and not integration" -v

  test-integration:
    name: Integration (${{ matrix.os }})
    needs: [lint]
    if: github.event_name != 'push' || github.ref == 'refs/heads/main'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[full,windows]" pytest pytest-mock
      - run: pytest -v --tb=short
        env:
          TETODL_CI: "1"

  build:
    name: Build (${{ matrix.os }})
    needs: [test-unit, test-integration]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyinstaller
      - run: pip install -e ".[full,windows]"
      - name: Build binary
        run: pyinstaller tetodl.spec --clean
      - name: Smoke test
        run: ./dist/tetodl${{ matrix.os == 'windows-latest' && '.exe' || '-linux' }} --version
      - uses: actions/upload-artifact@v4
        with:
          name: tetodl-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }}
          path: dist/tetodl*

  verify-install-windows:
    name: Installer (Windows)
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tetodl-windows
      - name: Install to PATH
        run: |
          $installDir = "$env:LOCALAPPDATA\TetoDL"
          New-Item -ItemType Directory -Path $installDir -Force | Out-Null
          Move-Item -Path "tetodl.exe" -Destination "$installDir\tetodl.exe" -Force
          echo "$installDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
      - name: Smoke test — PowerShell
        run: |
          tetodl --version
          tetodl --help
          tetodl --info
      - name: Smoke test — CMD
        shell: cmd
        run: |
          tetodl.exe --version
          tetodl.exe --help
      - name: Error handling (invalid flag -> exit non-zero)
        run: |
          $ErrorActionPreference = "Continue"
          tetodl --this-flag-does-not-exist 2>$null
          if ($LASTEXITCODE -eq 0) { throw "Expected non-zero exit for invalid flag" }

  verify-fresh-env:
    name: Fresh Env (${{ matrix.os }})
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tetodl-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'windows' }}
      - name: Run binary WITHOUT Python setup (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          .\tetodl.exe --version
      - name: Run binary WITHOUT Python setup (Linux)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x tetodl-linux
          ./tetodl-linux --version
      - name: Binary — help + info (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          .\tetodl.exe --help | Select-String -Pattern "usage"
          .\tetodl.exe --info | Select-String -Pattern "TetoDL"
      - name: Binary — help + info (Linux)
        if: matrix.os != 'windows-latest'
        run: |
          ./tetodl-linux --help | grep -q "usage"
          ./tetodl-linux --info | grep -q "TetoDL"

  verify-installer-windows:
    name: Installer Script (Windows)
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tetodl-windows
      - name: Run installer script
        run: |
          $env:TETODL_FORCE = "1"
          & .\install.ps1 -Force
      - name: Verify installed binary
        run: tetodl --version

  verify-installer-linux:
    name: Installer Script (Linux-apt)
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run installer script
        run: echo "2" | bash install.sh
      - name: Verify installed binary
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tetodl --version
          tetodl --help

  verify-installer-alpine:
    name: Installer (Alpine)
    needs: [build]
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container: alpine:latest
    steps:
      - uses: actions/checkout@v4
      - name: Run installer script (Alpine)
        run: |
          apk add bash curl
          echo "2" | bash install.sh
      - name: Verify installed binary
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          tetodl --version

  test-distros:
    name: Linux (${{ matrix.distro }})
    needs: [lint]
    if: github.event_name == 'workflow_dispatch' && fromJSON(inputs.full_ci)
    strategy:
      fail-fast: false
      matrix:
        distro:
          - ubuntu:20.04
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:11
          - debian:12
          - archlinux:latest
          - fedora:40
          - fedora:41
          - alpine:latest
          - nixos/nix:latest
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.distro }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Python + ffmpeg + shells
        run: |
          case "${{ matrix.distro }}" in
            ubuntu*|debian*)
              apt-get update -qq
              apt-get install -y -qq python3-pip ffmpeg zsh fish ;;
            archlinux*)
              pacman -Sy --noconfirm python python-pip ffmpeg zsh fish ;;
            fedora*)
              dnf install -y python3-pip python3-devel ffmpeg-free zsh fish ;;
            alpine*)
              apk add python3 py3-pip ffmpeg zsh fish bash ;;
            nixos*)
              nix-shell -p python3 python3Packages.pip ffmpeg-headless zsh fish
              --run "echo 'shells installed'" ;;
          esac
      - name: Test pip install — shell compatibility
        run: |
          pip install -e ".[full]"
          tetodl --version
          tetodl --help
          zsh -c 'source ~/.zshrc 2>/dev/null; tetodl --version'
          zsh -c 'source ~/.zshrc 2>/dev/null; tetodl --help'
          fish -c 'tetodl --version'
          fish -c 'tetodl --help'
      - name: Test binary — shell compatibility
        run: |
          pip install pyinstaller
          pyinstaller tetodl.spec --clean
          ./dist/tetodl-linux --version
          zsh -c './dist/tetodl-linux --version'
          fish -c './dist/tetodl-linux --version'
      - name: Test install.sh script (non-interactive)
        run: |
          echo "2" | bash install.sh 2>&1
          export PATH="$HOME/.local/bin:$PATH"
          bash -c 'tetodl --version'
          zsh -c 'tetodl --version'
          fish -c 'tetodl --version'

  e2e:
    name: E2E (Real URLs)
    if: github.event_name == 'workflow_dispatch' && fromJSON(inputs.full_ci)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[full]"
      - name: Real download test
        run: |
          tetodl "https://youtu.be/dQw4w9WgXcQ" -a -f m4a --smart-cover --lyrics -o /tmp/test-dl
          test -f /tmp/test-dl/*.m4a
          tetodl "https://youtu.be/dQw4w9WgXcQ" --thumbnail-only -f jpg -o /tmp/test-dl
          test -f /tmp/test-dl/*.jpg

  release:
    name: Release
    if: github.event_name == 'workflow_dispatch' && fromJSON(inputs.release)
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Generate tag
        id: tag
        run: echo "tag=v$(date +'%Y.%m.%d')" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            tetodl-linux/tetodl*
            tetodl-windows/tetodl*
